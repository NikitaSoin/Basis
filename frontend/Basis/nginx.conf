server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Хешированные ассеты (main.<hash>.js/css) иммутабельны — кэшируем надолго.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html и SPA-фолбэк — НИКОГДА не кэшировать: иначе после деплоя браузер/CDN
    # держит старый index.html со ссылкой на старый бандл и «ничего не меняется».
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }
}
