	<meta property="og:description" content="Справедливая цена акций, разбор облигаций, скринер, макро- и геополитический обзор, диагностика портфеля. Не брокер — только факты, оценки и логика.">
	<meta property="og:url" content="https://inbasis.ru/">
	<meta property="og:image" content="https://inbasis.ru/favicon.svg">
	<meta property="og:locale" content="ru_RU">
	<meta name="twitter:card" content="summary">
	<meta name="twitter:title" content="Basis — независимая инвестиционная аналитика">

	<meta name="twitter:image" content="https://inbasis.ru/favicon.svg">

	<!-- Fonts: Inter (UI/text), JetBrains Mono (numbers/tickers).
	     Inter Display H1-H2 falls back to Inter (display optical size). -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=JetBrains+Mono:wght@400..600&family=Source+Serif+4:opsz,wght@8..60,400..600&display=swap"
		rel="stylesheet">
	<!-- Basis Design System fonts (Fraunces / IBM Plex Mono); Inter уже подключён выше -->
	<link
		href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
		rel="stylesheet">

	<!-- Anti-FOUC: set theme class on <html> BEFORE first paint.
	     Default = LIGHT. Dark only if the user explicitly chose it.
	     Keeps data-theme attr for back-compat. -->
	<script>
		(function () {
			try {
				var stored = localStorage.getItem("basis_theme");
				var isDark = stored === "dark";
				var el = document.documentElement;
				if (isDark) {
					el.classList.add("dark");
					el.setAttribute("data-theme", "dark");
				} else {
					el.setAttribute("data-theme", "light");
				}
			} catch (e) {}
		})();
	</script>
	<!--
      manifest.json provides metadata used when your web app is added to the
      homescreen on Android. See https://developers.google.com/web/fundamentals/engage-and-retain/web-app-manifest/
    -->
	<link rel="manifest" href="%PUBLIC_URL%/manifest.json">
	<!-- Brand favicon: «Слои-фундамент» monogram B (cobalt app-icon). -->
	<link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg">
	<link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg">
	<!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
	<title>Basis — независимая инвестиционная аналитика для частного инвестора</title>
